name: Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env: 
  TIINGO_TOKEN: ${{TIINGO_TOKEN}}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Build
      run: go build -v ./...

    - name: Test
      env: 
        TIINGO_TOKEN: $TIINGO_TOKEN
      run: go test -v ./...
